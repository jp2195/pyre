version: 2
project_name: pyre

before:
  hooks:
    - go mod tidy

builds:
  - id: pyre
    main: ./cmd/pyre
    binary: pyre
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X main.version={{.Version}} -X main.commit={{.Commit}}

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE*
      - README*

checksum:
  name_template: 'checksums.txt'

sboms:
  - id: archive-sbom
    artifacts: archive
    documents:
      - "${artifact}.spdx.json"

# Sign the checksum file with cosign keyless (GitHub OIDC). cosign writes a
# single Sigstore bundle (checksums.txt.bundle) carrying the signature,
# certificate, and transparency-log entry. Verifiers check the bundle against
# the workflow identity, then verify archives against the signed checksums —
# one signature covers every artifact. (Legacy .sig/.pem output was retired
# when cosign defaulted sign-blob to the new bundle format.)
signs:
  - cmd: cosign
    artifacts: checksum
    signature: '${artifact}.bundle'
    output: true
    args:
      - sign-blob
      - '--bundle=${signature}'
      - '--yes'
      - '${artifact}'

snapshot:
  version_template: "{{ .Tag }}-next"

# release-please creates the GitHub release with a categorized CHANGELOG.md
# body. Tell goreleaser to attach artifacts without touching that body, and
# suppress goreleaser's own changelog generation so the two don't collide.
release:
  mode: keep-existing

changelog:
  disable: true
